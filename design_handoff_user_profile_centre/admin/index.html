<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>start.ai · Admin · Pool Health Overview</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;background:#EEF1F8;color:#2C2C2C;font-family:"DM Sans",system-ui,sans-serif;height:100%}
  *{box-sizing:border-box}
  #root{min-height:100vh}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#D6D9E1;border-radius:10px;border:2px solid #EEF1F8}
  ::-webkit-scrollbar-track{background:transparent}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4285F4"/>
      <stop offset="1" stop-color="#1E4FA8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="#EEF1F8"/>
  <g transform="translate(120,120)">
    <rect x="0"   y="0"   width="70" height="70" rx="10" fill="url(#g)"/>
    <rect x="90"  y="0"   width="70" height="70" rx="10" fill="#fff" stroke="url(#g)" stroke-width="3"/>
    <rect x="0"   y="90"  width="70" height="70" rx="10" fill="#fff" stroke="url(#g)" stroke-width="3"/>
    <rect x="90"  y="90"  width="70" height="70" rx="10" fill="url(#g)"/>
  </g>
  <text x="200" y="320" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="600" fill="#111125">start.ai · Admin</text>
</svg>
</template>
<div id="root"></div>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="ModuleTabs.jsx"></script>
<script type="text/babel" src="KpiStrip.jsx"></script>
<script type="text/babel" src="CoverageRadar.jsx"></script>
<script type="text/babel" src="LifecycleFunnel.jsx"></script>
<script type="text/babel" src="RegionActivation.jsx"></script>
<script type="text/babel" src="Panels.jsx"></script>
<script type="text/babel" src="DrillDownModal.jsx"></script>
<script type="text/babel" src="PoolHealthOverview.jsx"></script>
<script type="text/babel" src="UserExplorer.jsx"></script>
<script type="text/babel" src="GapAlertsModule.jsx"></script>
<script type="text/babel" src="AnalyticsModule.jsx"></script>
<script type="text/babel" src="CampaignsModule.jsx"></script>
<script type="text/babel" src="OtherModules.jsx"></script>
<script type="text/babel">
function App() {
  const [tab, setTab] = React.useState(() => localStorage.getItem('startai-admin-tab') || 'overview');
  const [drill, setDrill] = React.useState(null);
  const onNavigate = (k) => { setTab(k); localStorage.setItem('startai-admin-tab', k); };

  const page = (() => {
    switch(tab){
      case 'overview':  return <PoolHealthOverview onOpenDrill={setDrill} onNavigate={onNavigate}/>;
      case 'explorer':  return <UserExplorer/>;
      case 'gaps':      return <GapAlertsModule/>;
      case 'analytics': return <AnalyticsModule/>;
      case 'campaigns': return <CampaignsModule/>;
    }
  })();

  return (
    <div style={{display:'flex', minHeight:'100vh', background:'#EEF1F8'}}>
      <Sidebar active={tab} onNavigate={onNavigate}/>
      <div style={{flex:1, display:'flex', flexDirection:'column', minWidth:0}}>
        <TopBar/>
        <ModuleTabs active={tab} onChange={onNavigate}/>
        <div style={{flex:1, overflow:'auto'}}>{page}</div>
      </div>
      <DrillDownModal open={!!drill} onClose={()=>setDrill(null)} context={drill}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
